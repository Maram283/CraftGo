<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CraftGo - Role Selection Mockup</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0D1420;
            color: #FFFFFF;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
        }
        .logo-area {
            text-align: center;
            margin-bottom: 10px;
        }
        h2 {
            text-align: center;
            color: #FFFFFF;
            margin-bottom: 40px;
            font-size: 24px;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .card:hover {
            background: rgba(212, 160, 23, 0.1);
            border: 1px solid #D4A017;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(212, 160, 23, 0.2);
        }
        .icon-box {
            width: 55px;
            height: 55px;
            min-width: 55px;
            border-radius: 15px;
            background: linear-gradient(135deg, #F7B500, #D89A00);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #111;
            box-shadow: 0 4px 15px rgba(247, 181, 0, 0.4);
        }
        .text-box h3 {
            margin: 0;
            font-size: 19px;
            font-weight: 600;
            color: #FFF;
        }
        .text-box p {
            margin: 6px 0 0;
            font-size: 14px;
            color: #A0A5B1;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>أهلاً بك في عالم الحرف<br><span style="color: #D4A017; font-size: 16px; font-weight: normal; margin-top:10px; display:block;">حدد طبيعة حسابك للمتابعة</span></h2>
        
        <div class="card">
            <div class="icon-box">🛠️</div>
            <div class="text-box">
                <h3>أنا حرفي</h3>
                <p>سجل لتقديم خدماتك، تلقي الطلبات، وعرض أعمالك الإبداعية.</p>
            </div>
        </div>

        <div class="card">
            <div class="icon-box">🔍</div>
            <div class="text-box">
                <h3>أبحث عن حرفي</h3>
                <p>تصفح أمهر الحرفيين، واطلب خدمات تناسب احتياجك.</p>
            </div>
        </div>

        <div class="card">
            <div class="icon-box">⚙️</div>
            <div class="text-box">
                <h3>إدارة النظام</h3>
                <p>الدخول بصلاحيات الأدمن لإدارة التطبيق.</p>
            </div>
        </div>
    </div>
</body>
</html>
