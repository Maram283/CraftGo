<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 700" width="400" height="700">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0E17" />
      <stop offset="100%" stop-color="#121B2A" />
    </linearGradient>
    
    <!-- Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7B500" />
      <stop offset="100%" stop-color="#D89A00" />
    </linearGradient>

    <!-- Glassmorphism Card Gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.08)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.02)" />
    </linearGradient>
    
    <!-- Gold Glow Filter -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="700" fill="url(#bgGrad)" />

  <!-- Logo Glow background -->
  <circle cx="200" cy="80" r="100" fill="#F7B500" opacity="0.05" filter="url(#goldGlow)" />

  <!-- Title Text -->
  <text x="200" y="70" fill="#FFFFFF" font-family="Segoe UI, Tahoma, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">أهلاً بك في عالم الحرف</text>
  <text x="200" y="100" fill="#D4A017" font-family="Segoe UI, Tahoma, sans-serif" font-size="15" text-anchor="middle">حدد طبيعة حسابك للمتابعة</text>

  <!-- Card 1: Craftsman -->
  <g transform="translate(20, 160)">
    <!-- Outer Border -->
    <rect width="360" height="120" rx="20" fill="url(#cardGrad)" stroke="rgba(255, 255, 255, 0.12)" stroke-width="1.5" />
    <!-- Icon Box -->
    <rect x="20" y="32.5" width="55" height="55" rx="15" fill="url(#goldGrad)" />
    <text x="47.5" y="70" font-size="28" text-anchor="middle">🛠️</text>
    <!-- Text Content -->
    <text x="95" y="48" fill="#FFFFFF" font-family="Segoe UI, Tahoma, sans-serif" font-size="18" font-weight="bold">أنا حرفي</text>
    <text x="95" y="72" fill="#A0A5B1" font-family="Segoe UI, Tahoma, sans-serif" font-size="12">سجل لتقديم خدماتك، تلقي الطلبات،</text>
    <text x="95" y="90" fill="#A0A5B1" font-family="Segoe UI, Tahoma, sans-serif" font-size="12">وعرض أعمالك الإبداعية المميزة.</text>
  </g>

  <!-- Card 2: Client -->
  <g transform="translate(20, 300)">
    <rect width="360" height="120" rx="20" fill="url(#cardGrad)" stroke="rgba(255, 255, 255, 0.12)" stroke-width="1.5" />
    <rect x="20" y="32.5" width="55" height="55" rx="15" fill="url(#goldGrad)" />
    <text x="47.5" y="70" font-size="28" text-anchor="middle">🔍</text>
    <text x="95" y="48" fill="#FFFFFF" font-family="Segoe UI, Tahoma, sans-serif" font-size="18" font-weight="bold">أبحث عن حرفي</text>
    <text x="95" y="72" fill="#A0A5B1" font-family="Segoe UI, Tahoma, sans-serif" font-size="12">تصفح أمهر الحرفيين في منطقتك،</text>
    <text x="95" y="90" fill="#A0A5B1" font-family="Segoe UI, Tahoma, sans-serif" font-size="12">واطلب خدمات تناسب احتياجاتك.</text>
  </g>

  <!-- Card 3: Admin -->
  <g transform="translate(20, 440)">
    <rect width="360" height="120" rx="20" fill="url(#cardGrad)" stroke="rgba(255, 255, 255, 0.12)" stroke-width="1.5" />
    <rect x="20" y="32.5" width="55" height="55" rx="15" fill="url(#goldGrad)" />
    <text x="47.5" y="70" font-size="28" text-anchor="middle">⚙️</text>
    <text x="95" y="48" fill="#FFFFFF" font-family="Segoe UI, Tahoma, sans-serif" font-size="18" font-weight="bold">إدارة النظام</text>
    <text x="95" y="72" fill="#A0A5B1" font-family="Segoe UI, Tahoma, sans-serif" font-size="12">الدخول بصلاحيات الأدمن لإدارة التطبيق</text>
    <text x="95" y="90" fill="#A0A5B1" font-family="Segoe UI, Tahoma, sans-serif" font-size="12">والتحكم بالمستخدمين والطلبات.</text>
  </g>
</svg>
